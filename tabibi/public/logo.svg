<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160" role="img" aria-label="Tabibi — طبيبي">
  <!-- Icon: rounded square, jasmine-cross + heartbeat pulse -->
  <defs>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a8f8c"/>
      <stop offset="100%" stop-color="#0b6f6e"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="144" height="144" rx="32" fill="url(#tealGrad)"/>
  <!-- Jasmine-petal medical cross (5 rounded petals evoking Tunisia's national flower) -->
  <g fill="#ffffff">
    <rect x="66" y="30" width="28" height="100" rx="14"/>
    <rect x="30" y="66" width="100" height="28" rx="14"/>
  </g>
  <!-- Heartbeat pulse across the cross, Tunisian red -->
  <polyline points="34,80 60,80 70,60 82,100 92,72 98,80 126,80"
            fill="none" stroke="#e70013" stroke-width="7"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wordmark -->
  <text x="180" y="92" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="64" font-weight="700" fill="#0b6f6e">Tabibi</text>
  <text x="180" y="132" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="30" fill="#24a5a5" direction="rtl">طبيبي — صحتك أولويتنا</text>
</svg>
